            text: `New words for a dictionary\n\nThe editors of a new online dictionary are inviting the public to submit words that they would like to see in the dictionary. People are already sending in words, some of which they have (1) ___ themselves - these will almost certainly not (2) ___ in the dictionary!\n\nWhen a new word is submitted, editors check newspapers, radio, television and social networks to see how (3) ___ the word is used. They also (4) ___ whether the word is likely to remain in use for more than one or two years. The evidence they collect will help them decide whether or not to put it in the dictionary.\n\nEditors will (5) ___ feedback on any words submitted by the public. Even words not accepted will (6) ___ to be monitored over the following year. Editors need to be (7) ___ of new words which emerge from areas such as popular culture and technology, so that their dictionary is a genuine (8) ___ of the current language.`,

          {

            text: `Animal communication\n\nIt is sometimes said that animals use language. Certainly some animal species have developed amazingly sophisticated ways of communicating with (9) ___ another.\n\nBut there are huge differences between the ways animals communicate and the ways human beings do. When animals make a sound, such (10) ___ a bark or a call, it is in reaction to (11) ___ is happening around them. An alarm call means they are frightened. A hunger call means they want food. Animals, though, cannot make a call meaning 'I was scared yesterday' or 'I'll be hungry tomorrow'. Only human beings are capable (12) ___ doing this.\n\nZoologists have had some success in teaching human language to animals. (13) ___ famous experiments, chimpanzees have (14) ___ taught to use their hands to give information on a range of things. Some animals have even managed to put signs together in (15) ___ to make simple sentences. However, getting them to do this takes a huge (16) ___ of training.`,

          {
            id: 5,
            title: "Part 5: Reading Comprehension",
            instructions: "You are going to read part of an autobiography in which a gardener talks about his childhood. For questions 31-36, choose the answer (A, B, C or D) which you think fits best.",
            text: `Green fingers\n\nIt never occurred to me when I was little that gardens were anything less than glamorous places. Grandad's garden was on the bank of a river and sloped gently down towards the water. You couldn't reach the river but you could hear the sound of the water and the birds that sang in the trees above. I imagined that all gardens were like this a place of escape, peace and solitude. Grandad's plot was nothing out of the ordinary when it came to features. He had nothing as grand as a greenhouse, unlike some of his neighbours...\n\nAt home, his son, my father, could be quiet and withdrawn. I wouldn't want to make him sound humourless. He wasn't. Silly things would amuse him. He had phrases that he liked to use, 'It's immaterial to me' being one of them. 'I don't mind' would have done just as well but he liked the word 'immaterial'. I realise that, deep down, he was probably disappointed that he hadn't made more of his life. He left school without qualifications and became apprenticed to a plumber. Plumbing was not something he was passionate about... Where he came into his own was around the house. He had an 'eye for the job'. Be it bookshelves or a cupboard - what he could achieve was astonishing.\n\nMy parents moved house only once in their entire married life. But my mother made up for this lack of daring when it came to furniture. You would just get used to the shape of one chair when another appeared, but the most dramatic change of all was the arrival of a piano. I always wanted to like it but it did its best to intimidate me. The only thing I did like about it were the two brass candlesticks that jutted out... There was never any mention of my being allowed to play it. Instead lessons were booked for my sister.\n\nOf the three options, moors, woods or river - the river was the one that usually got my vote. On a stretch of the river I was allowed to disappear with my imagination into another world. With a fishing net over my shoulder I could set off in sandals... I'd walk along the river bank looking for a suitable spot where I could take off the painful sandals and leave them with my picnic while I ventured out, tentatively, peering through the water for any fish that I could scoop up...\n\nI wanted to leave school as soon as possible but that seemed an unlikely prospect until one day my father announced, 'They've got a vacancy for an apprentice gardener in the Parks Department. I thought you might be interested.' In one brief moment Dad had gone against his better judgement. He might still have preferred it if I became a carpenter. But I like to feel that somewhere inside him was a feeling that things might just turn out for the best. If I stuck at it. Maybe I'm deceiving myself, but I prefer to believe that in his heart, although he hated gardening himself, he'd watched me doing it for long enough and noticed my unfailing passion for all things that grew and flowered and fruited.`,

          {

            instructions: "You are going to read an article about the experience of running while listening to music. Six sentences have been removed from the article. Choose from the sentences A-G the one which fits each gap (37-42). There is one extra sentence which you do not need to use.",
            text: `Does music make you run faster?\n\nRunner Adharanand Finn took part in an unusual race in order to test the theory that music can make you run faster.\n\nAn expert on the effects of music on exercise, Dr Costas Karageorghis, claims that listening to music while running can boost performance by up to 15%. To put this theory to the test, I took part in a special Rock 'n' Roll half marathon, which had groups of musicians playing at various points along the route.\n\nAs I lined up at the start with almost 4,000 other runners, a singer sang an inspiring song for us. It may explain why I got off to a good start. I only came eighth in the end, though, even though I'd just spent six months training hard. (37) ___ However, it turns out that all the training may have affected my response to the music; according to the research, the benefits of listening to music decrease with the level of intensity of the running.\n\n'Elite athletes,' says Karageorghis, 'tend to focus inwardly when they are running.' According to him, most other runners look for stimulus and distraction from what is going on around them. 'Judging by your time,' he says, 'you are one of the former.' It is true. Apart from the song at the start, when I was standing still, I can barely remember the music played along the course. The first act I passed, a folk group, made me smile, and at one point I found myself running in time to the beat of some hard rock. (38) ___ I can't say they helped my performance very much. But what did other runners make of the music?\n\nAdam Bull usually runs marathons with no music and little crowd support. (39) ___ 'With the upbeat bands, you find yourself running to the beat, which helps. It also brings out people to cheer you on.' Rosie Bradford was also a convert. 'As we ran past one band and they started playing These Boots Were Made for Walking, everybody suddenly went faster.'\n\nThe only person I found who was less than happy with the music was Lois Lloyd. 'There wasn't enough of it, and I found it wasn't loud enough, so I ran with an MP3 player.' she said. (40) ___ Karageorghis is not surprised when I tell him. 'There are many advantages to using your own player, rather than relying on the music on the course,' he says. 'It gives you a constant stimulus, rather than just an occasional one, and you can tailor the playlist to your taste.'\n\nOne runner told me there was a direct correlation between the quality of the music on the course and how much it helped. But quality, of course, is subjective. I remember feeling annoyed as I ran past one band playing Keep On Running. (41) ___\n\nOf course, the music was not only there to help runners break their personal bests (although sadly it was unable to help me beat mine), but to provide a sense of occasion, draw out the crowds and create a carnival atmosphere. (42) ___ As I left, people were beginning to relax after the run, listening to an excellent rock band. It was a fitting way to end the day.\n\n---\nOptions:\nA. 'I need my music all the time.'\nB. I think they knew why I found the music here so distracting.\nC. I enjoyed that for a few moments, but both of them came and went in a flash.\nD. Along with some spring sunshine, it certainly achieved that.\nE. Someone else, though, may have found it uplifting.\nF. I was, in fact, taking my running pretty seriously at that time.\nG. 'The music here has been great for my performance.'`,

            text: `A. Science for All\nFortunately for me and non-scientists everywhere, the makers of Science for All are there to plug the gaps in our knowledge. The series is rather like a knowledgeable parent who doesn't mind being pestered by wide-eyed and curious children: it takes the time to explain all those fascinating mysteries of nature in an entertaining and understandable way. The last series opened my eyes to all manner of interesting facts... And the new series shows no lack of inspiration for subjects to tackle: everything from the existence of life on other planets to the odd properties of human memory are rightly considered suitable subjects.\n\nB. Out in Space\nAlthough I wasn't expecting much from this series, I'm pleased that the producers of Out in Space persisted with their unpromising subject. In the course of the first programme we learn about hurricanes, deserts, and even how the Moon was made... That's not to say the programme explored them in any great detail, preferring to skip breathlessly from one to the next. The essential logic of the series seemed to be that if you take any natural phenomenon and ask 'why?' enough times, the answers will eventually be that it's something to do with space. The two presenters attempted to get it all to fit together, by taking part in exciting activities.\n\nC. Stars and Planets\nLike its predecessor, this is big on amazing photography and fabulous graphics... This time the scope is even wider, astronomically speaking. What we are being introduced to here are ambitious ideas about time and space, and the presenter succeeds rather better than you might expect. It helps that he doesn't go too deep, as once you start thinking about it this is tricky stuff to get your head around. The point of such programmes is less to explain every detail than to arouse a generalised sense of amazement that might lead to further thinking, and Stars and Planets is certainly good at that.\n\nD. Robot Technology\nThis ground-breaking science documentary series follows a group of experts as they attempt to build a complete artificial human from robotic body parts... It is the realisation of a long-held dream to create a human from manufactured parts... The series explores to what extent modern technology is capable of replacing body parts - or even improving their abilities. The presenter, very appropriately, has an artificial hand himself. This ambitious series gives us a guided tour of the wonders of modern technology. Though it can be a slightly upsetting journey at times, it engages the audience in a revolution that is changing the face of medicine.`,

        // --- Application State ---
        let activePartId = examData[0].id;
        let activeQuestionId = null;
        let mobileMenuOpen = false;

        // --- Helper: Highlight Text ---
        function getHighlightedText(text, highlightRef) {
            if (!highlightRef) return text;
            
            const parts = text.split(highlightRef);
            if (parts.length === 1) return text;

            const markOpen = `<mark class="bg-yellow-200 text-slate-900 rounded px-1 shadow-sm font-medium transition-all duration-300">`;
            const markClose = `</mark>`;
            
            return parts.join(markOpen + highlightRef + markClose);
        }

        // --- UI Rendering Functions ---
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let html = '';
            
            examData.forEach(part => {
                const isActive = activePartId === part.id;
                const classes = isActive 
                    ? 'bg-blue-100 text-blue-700' 
                    : 'text-slate-600 hover:bg-slate-100';
                    
                html += `
                    <button onclick="selectPart(${part.id})" class="w-full text-left px-3 py-2.5 rounded-md text-sm font-medium transition-colors ${classes}">
                        ${part.title}
                    </button>
                `;
            });
            
            nav.innerHTML = html;
        }

        function renderTextPane() {
            const content = document.getElementById('text-content');
            const part = examData.find(p => p.id === activePartId);
            const activeQ = part.questions.find(q => q.qNum === activeQuestionId);
            const highlightRef = activeQ ? activeQ.highlightRef : null;

            let html = `
                <div class="mb-6 pb-4 border-b border-slate-100">
                    <h2 class="text-xl font-bold text-slate-800 mb-2">${part.title}</h2>
                    <p class="text-sm text-slate-500 italic">${part.instructions}</p>
                </div>
                <div class="prose prose-slate max-w-none text-[15px]">
            `;

            part.text.split('\n\n').forEach(paragraph => {
                html += `<p class="mb-4 text-justify whitespace-pre-wrap leading-relaxed">${getHighlightedText(paragraph, highlightRef)}</p>`;
            });

            html += `</div>`;
            content.innerHTML = html;
        }

        function renderQuestionsPane() {
            const container = document.getElementById('questions-container');
            const part = examData.find(p => p.id === activePartId);
            
            let html = '';
            
            part.questions.forEach(q => {
                const isActive = activeQuestionId === q.qNum;
                const borderClass = isActive ? 'border-blue-400 shadow-md ring-1 ring-blue-400' : 'border-slate-200 hover:border-blue-300 hover:shadow-sm cursor-pointer';
                const circleClass = isActive ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600';
                const chevronClass = isActive ? 'rotate-180' : '';
                
                let optionsHtml = '';
                if (q.options) {
                    optionsHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-1 mt-2">`;
                    q.options.forEach(opt => {
                        optionsHtml += `<span class="text-xs text-slate-500">${opt}</span>`;
                    });
                    optionsHtml += `</div>`;
                }

                let expandedContentHtml = '';
                if (isActive) {
                    expandedContentHtml = `
                        <div class="p-4 bg-blue-50/50 border-t border-blue-100">
                            <div class="mb-3">
                                <span class="text-xs font-bold uppercase tracking-wider text-green-600 mb-1 block">Correct Answer</span>
                                <span class="text-lg font-semibold text-slate-900">${q.answer}</span>
                            </div>
                            <div class="flex items-start gap-2 bg-white p-3 rounded-lg border border-blue-100">
                                <div class="text-blue-500 shrink-0 mt-0.5">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                                </div>
                                <div>
                                    <span class="text-xs font-bold uppercase tracking-wider text-blue-600 mb-1 block">Explanation</span>
                                    <p class="text-sm text-slate-700 leading-relaxed">${q.explanation}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div class="bg-white border rounded-xl overflow-hidden transition-all duration-200 ${borderClass}">
                        <div class="p-4 flex items-start gap-4 cursor-pointer" onclick="toggleQuestion(${q.qNum})">
                            <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${circleClass}">
                                ${q.qNum}
                            </div>
                            <div class="flex-1">
                                ${q.text ? `<p class="font-medium text-slate-800 text-sm md:text-base mb-1">${q.text}</p>` : ''}
                                ${optionsHtml}
                            </div>
                            <div class="mt-1 transition-transform ${chevronClass}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                        </div>
                        ${expandedContentHtml}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // --- Interaction Handlers ---
        window.selectPart = function(partId) {
            activePartId = partId;
            activeQuestionId = null;
            mobileMenuOpen = false;
            updateUI();
        };

        window.toggleQuestion = function(qNum) {
            activeQuestionId = activeQuestionId === qNum ? null : qNum;
            renderTextPane();
            renderQuestionsPane();
        };

        window.toggleMobileMenu = function() {
            mobileMenuOpen = !mobileMenuOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (mobileMenuOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        };

        function updateUI() {
            renderSidebar();
            renderTextPane();
            renderQuestionsPane();
            
            // Handle mobile menu close side-effects
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (!mobileMenuOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // --- Init App ---
        updateUI();

    </script>
</body>
</html>
